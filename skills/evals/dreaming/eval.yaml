name: dreaming-eval
description: Evaluation suite for Dreaming skill
skill: dreaming
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
graders:
  - type: text
    name: relevant_content
    config:
      regex_match:
        - "(?i)(–њ–∞—В—В–µ—А–љ|–Є–љ—Б–∞–є—В|–њ—А–Њ–±–ї–µ–Љ–∞|pattern|insight)"
tasks:
  - "tasks/*.yaml"
